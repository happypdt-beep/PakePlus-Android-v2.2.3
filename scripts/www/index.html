<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>取餐叫号器</title>
<style>
body {
  margin:0;
  font-family:微软雅黑,sans-serif;
  background:#ff7043;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  min-height:100vh;
  color:white;
  padding-top:20px;
  box-sizing:border-box;
}

#number{
  font-size:22vw;
  margin-bottom:15px;
  font-weight:bold;
  text-align:center;
}

.keypad{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  width:95%;
  max-width:400px;
  margin-bottom:15px;
}

button{
  font-size:7vw;
  padding:15px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.25);
  color:white;
  text-align:center;
}

button:active{
  transform:scale(0.95);
}

/* 外卖按钮单独样式 */
#deliveryBtn{
  width:60%;
  background:#ffd54f;
  color:#333;
  font-size:6vw;
  margin:0 auto 10px auto;
  border-radius:10px;
}

/* 暂停按钮 */
#pauseBtn{
  width:40%;
  background:#b0bec5;
  color:#333;
  font-size:5vw;
  margin:0 auto;
  border-radius:10px;
  padding:10px 0;
}
</style>
</head>
<body>

<div id="number">1</div>

<div class="keypad">
  <button onclick="callNum(1)">1</button>
  <button onclick="callNum(2)">2</button>
  <button onclick="callNum(3)">3</button>
  <button onclick="callNum(4)">4</button>
  <button onclick="callNum(5)">5</button>
  <button onclick="callNum(6)">6</button>
  <button onclick="callNum(7)">7</button>
  <button onclick="callNum(8)">8</button>
  <button onclick="callNum(9)">9</button>
  <button onclick="callNum(10)" style="grid-column: span 3;">10</button>
</div>

<button id="deliveryBtn" onclick="callDelivery()">外卖</button>
<button id="pauseBtn" onclick="pauseAudio()">暂停</button>

<script>
let currentAudio1 = null;
let currentAudio2 = null;
let delayTimer = null;

// 更新显示数字
function update(num){
  const el = document.getElementById("number");
  el.textContent = num;
  el.style.transform="scale(1.15)";
  setTimeout(()=>el.style.transform="scale(1)",150);
}

// 播放 mp3 两遍
function playAudio(fileName){
  // 停止上一条
  stopAudio();

  currentAudio1 = new Audio(fileName);
  currentAudio1.play().then(()=>{
    delayTimer = setTimeout(()=>{
      currentAudio2 = new Audio(fileName);
      currentAudio2.play();
    }, 3000); // 延迟 3 秒
  }).catch(()=>{
    alert("无法播放音频，请检查文件路径和浏览器权限");
  });
}

// 停止播放
function stopAudio(){
  if(currentAudio1){
    currentAudio1.pause();
    currentAudio1.currentTime = 0;
    currentAudio1 = null;
  }
  if(currentAudio2){
    currentAudio2.pause();
    currentAudio2.currentTime = 0;
    currentAudio2 = null;
  }
  if(delayTimer){
    clearTimeout(delayTimer);
    delayTimer = null;
  }
}

// 点击数字叫号
function callNum(num){
  update(num);
  playAudio(num+".mp3");
}

// 外卖按钮
function callDelivery(){
  update("外卖");
  playAudio("外卖.mp3");
}

// 暂停按钮
function pauseAudio(){
  stopAudio();
}
</script>

</body>
</html>
